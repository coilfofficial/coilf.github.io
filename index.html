<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Paneli</title>
    <!-- Markdown Dönüştürücü Kütüphane (BIO için) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Liquid Arka Plan Animasyonu */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #0f172a, #1e1b4b, #2e1065, #3b0764);
            background-size: 400% 400%;
            animation: liquidBg 15s ease infinite;
            overflow-x: hidden;
            color: #fff;
        }

        @keyframes liquidBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
            background: linear-gradient(to right, #c084fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Akışkan Buton Tasarımları */
        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .liquid-btn {
            position: relative;
            padding: 18px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .liquid-btn:hover {
            transform: translateY(-3px);
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 10px 25px rgba(168, 85, 247, 0.3);
        }

        /* Butonun içindeki akışkan efekt dalgası */
        .liquid-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: 0.5s;
        }

        .liquid-btn:hover::before {
            left: 100%;
        }

        /* BIO Modalı (Açılır Pencere) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
            z-index: 100;
            padding: 20px;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(30, 27, 75, 0.9), rgba(15, 23, 42, 0.9));
            border: 1px solid rgba(168, 85, 247, 0.3);
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: left;
            line-height: 1.6;
        }

        /* Markdown İçerik Stilleri */
        .markdown-body h1, .markdown-body h2 {
            color: #c084fc;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }
        .markdown-body p { margin-bottom: 15px; color: #cbd5e1; }
        .markdown-body ul { margin-left: 20px; margin-bottom: 15px; color: #cbd5e1; }
        .markdown-body code { background: rgba(168, 85, 247, 0.2); padding: 2px 6px; border-radius: 4px; font-family: monospace; }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>KONTROL MERKEZİ</h1>
        <div class="btn-grid">
            <!-- 1. Buton: AI Projeler (Gizli index Sayfası) -->
            <a href="ai-projeler.html" class="liquid-btn">AI Projeler</a>

            <!-- 2. Buton: Projeler (GitHub Profilin veya Repository sekmen) -->
            <!-- NOT: href kısmına kendi github linkini yazabilirsin -->
            <a href="https://github.com?tab=repositories" target="_blank" class="liquid-btn">Projeler</a>

            <!-- 3. Buton: BIO (Tıklandığında aşağıdaki Markdown modalını açar) -->
            <button class="liquid-btn" onclick="openBio()">BIO</button>

            <!-- 4. Buton: Forum (Harici Forum Sitesi Linki) -->
            <a href="https://forum.yoursite.com" target="_blank" class="liquid-btn">Forum</a>
        </div>
    </div>

    <!-- BIO Açılır Pencere Ekrani -->
    <div id="bioModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeBio()">&times;</button>
            <!-- Markdown içeriği bu div'in içine yüklenecek -->
            <div id="bioContent" class="markdown-body">Yükleniyor...</div>
        </div>
    </div>

    <script>
        // Biyografiyi göster ve bio.md dosyasını oku
        function openBio() {
            const modal = document.getElementById('bioModal');
            modal.classList.add('active');
            
            // GitHub deponuzdaki bio.md dosyasını çeker
            fetch('bio.md')
                .then(response => {
                    if (!response.ok) throw new Error('Dosya bulunamadı');
                    return response.text();
                })
                .then(markdownText => {
                    // İşaretlenmiş metni HTML'e çevirip ekrana basar
                    document.getElementById('bioContent').innerHTML = marked.parse(markdownText);
                })
                .catch(err => {
                    document.getElementById('bioContent').innerHTML = `<h2>Hata</h2><p>Biyografi yüklenemedi. bio.md dosyasının varlığından emin olun.</p>`;
                });
        }

        function closeBio() {
            document.getElementById('bioModal').classList.remove('active');
        }

        // Modal dışına tıklandığında kapatma
        window.onclick = function(event) {
            const modal = document.getElementById('bioModal');
            if (event.target == modal) {
                closeBio();
            }
        }
    </script>
</body>
</html>
